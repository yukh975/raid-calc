<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect width="48" height="48" rx="10" fill="#0d1117"/>
  <!-- Three disk drive outlines -->
  <rect x="4"  y="8" width="11" height="32" rx="2.5" fill="none" stroke="#58a6ff" stroke-width="2.1"/>
  <rect x="18" y="8" width="11" height="32" rx="2.5" fill="none" stroke="#58a6ff" stroke-width="2.1"/>
  <rect x="32" y="8" width="11" height="32" rx="2.5" fill="none" stroke="#58a6ff" stroke-width="2.1"/>
  <!-- Disk platter lines inside each drive -->
  <line x1="7"  y1="17" x2="12" y2="17" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="7"  y1="22" x2="12" y2="22" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="7"  y1="27" x2="12" y2="27" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="21" y1="17" x2="26" y2="17" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="21" y1="22" x2="26" y2="22" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="21" y1="27" x2="26" y2="27" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="35" y1="17" x2="40" y2="17" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="35" y1="22" x2="40" y2="22" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="35" y1="27" x2="40" y2="27" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
